<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hologram Avatar Assistant</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <!-- three.js as ES modules from CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 3D stage -->
  <div id="stage">
    <canvas id="scene"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="loader">
      <div class="ring"></div>
      <p>Booting hologram…</p>
    </div>

    <div id="status" class="status">idle</div>

    <button id="settingsBtn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>

    <!-- Navigation shortcuts hint card -->
    <div id="shortcuts">
      <div class="shortcuts-title">Navigation</div>
      <ul class="shortcuts-list">
        <li><span class="shortcut-keys"><kbd>drag</kbd></span><span>Orbit</span></li>
        <li><span class="shortcut-keys"><kbd>⌘</kbd><kbd>drag</kbd></span><span>Pan</span></li>
        <li><span class="shortcut-keys"><kbd>scroll</kbd><span class="sc-sep">/</span><kbd>pinch</kbd></span><span>Zoom</span></li>
      </ul>
    </div>
  </div>

  <!-- Chat dock -->
  <div id="dock">
    <div id="dock-handle" title="Drag to resize chat" aria-label="Resize chat"></div>
    <div id="transcript" aria-live="polite"></div>
    <form id="composer">
      <input id="prompt" type="text" autocomplete="off"
             placeholder="Ask your appliance assistant…" />
      <button id="mic" type="button" title="Speak" aria-label="Speak">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 19v3"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <rect x="9" y="2" width="6" height="13" rx="3"/>
        </svg>
      </button>
      <button id="send" type="submit" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"/>
          <path d="M6 12h16"/>
        </svg>
      </button>
    </form>
  </div>

  <!-- Settings panel -->
  <div id="settings" class="hidden" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="panel">
      <header>
        <h2>Settings</h2>
        <button id="closeSettings" aria-label="Close">✕</button>
      </header>

      <label>
        <span>LLM / TTS provider</span>
        <select id="provider">
          <option value="gemini">Google Gemini — smart replies + natural voice + real lip‑sync</option>
          <option value="local">Offline demo — no key, canned replies + browser voice</option>
        </select>
      </label>

      <div id="cloudSettings">
        <label>
          <span>Gemini API key</span>
          <input id="apiKey" type="password" placeholder="paste your key" />
        </label>
        <div class="row">
          <label>
            <span>Chat model</span>
            <input id="chatModel" type="text" placeholder="(provider default)" />
          </label>
          <label>
            <span>Voice</span>
            <select id="ttsVoice"></select>
          </label>
        </div>
        <p class="hint">The key is stored only in this browser (localStorage) and is sent
          directly to Google from your machine — never to any third-party server.</p>
      </div>

      <!-- Avatar presets -->
      <div class="settings-section-label">Avatar</div>
      <div id="avatarPresets" class="avatar-presets">
        <!-- preset cards are injected by main.js from AVATAR_PRESETS -->
      </div>
      <label id="customAvatarRow">
        <span>Custom GLB URL</span>
        <input id="avatarUrl" type="text" placeholder="https://… or ./assets/my-model.glb" />
        <em>Paste any .glb URL — <a href="https://studio.tripo3d.ai" target="_blank" rel="noopener">Tripo3D</a>, <a href="https://readyplayer.me" target="_blank" rel="noopener">Ready Player Me</a>, Sketchfab, …</em>
      </label>

      <label>
        <span>Personality / system prompt</span>
        <textarea id="systemPrompt" rows="3"></textarea>
      </label>

      <div class="actions">
        <button id="saveSettings" type="button">Save &amp; reload avatar</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
